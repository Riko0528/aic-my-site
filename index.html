<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>My Website</title>
    <style>
      body {
        margin: 0;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        color: #222;
        background: #f7f7f5;
      }

      main {
        width: min(720px, calc(100% - 32px));
        margin: 0 auto;
        padding: 96px 0;
      }

      h1 {
        margin: 0 0 16px;
        font-size: clamp(2rem, 6vw, 4rem);
        line-height: 1.1;
      }

      p {
        margin: 0;
        font-size: 1.125rem;
        line-height: 1.7;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>こんにちは</h1>
      <p>GitHub Pagesで公開するシンプルなWebサイトです。</p>
    </main>
  </body>
</html>
